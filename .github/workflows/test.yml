name: Test

on:
  pull_request:
    branches: [main, test]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync

      - run: uv run pytest tests/ -q
