services:
  validator:
    image: entrius/allways:latest
    container_name: aw-vali
    restart: unless-stopped
    mem_limit: "3g"
    entrypoint: /app/scripts/vali-entrypoint.sh
    env_file:
      - .env
    ports:
      # Set AXON_PUBLISH=127.0.0.1:<port> to bind loopback-only behind a proxy (unset = raw internet publish).
      - "${AXON_PUBLISH:-0.0.0.0:${PORT}}:${PORT}"
    volumes:
      - ${WALLET_PATH}:/root/.bittensor/wallets:ro
      - ./data/allways:/root/.allways
    # optional: uncomment to write dashboard rows from the validator
    # (requires STORE_DB_RESULTS=true and DB_* vars in .env)
    # networks:
    #   - allways_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  btc-node:
    image: bitcoin/bitcoin:28
    container_name: aw-btc
    restart: unless-stopped
    mem_limit: "512m" # set to "4g" for initial BTC sync, then revert
    # mem_limit: "4g"       # initial BTC sync — revert to 512m after sync completes
    command:
      - bitcoind
      - -server
      - -prune=5000 # keep ~5g worth of data on disk
      - -rpcuser=${BTC_RPC_USER}
      - -rpcpassword=${BTC_RPC_PASS}
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -rpcport=8332
    volumes:
      - ./data/btc:/home/bitcoin/.bitcoin

  watchtower:
    image: nickfedor/watchtower
    container_name: allways-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 200
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"

# optional: uncomment alongside the validator's `networks:` block to write
# dashboard rows into an externally-managed allways DB.
# networks:
#   allways_network:
#     external: true
